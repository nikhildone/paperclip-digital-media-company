name: Deploy Paperclip to Hugging Face

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Hugging Face uploader
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade huggingface_hub hf_xet

      - name: Prepare Space upload folder
        run: |
          rm -rf hf_space_upload
          mkdir -p hf_space_upload
          cp -R Dockerfile package.json package-lock.json server scripts hf_space_upload/
          if [ -d client ]; then cp -R client hf_space_upload/; fi
          if [ -d shared ]; then cp -R shared hf_space_upload/; fi
          cat > hf_space_upload/README.md <<'EOF'
          ---
          title: Paperclip AI Company
          emoji: 🧠
          colorFrom: blue
          colorTo: purple
          sdk: docker
          app_port: 8080
          ---
          EOF

      - name: Upload folder to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ.get("HF_TOKEN")
          repo_id = os.environ.get("HF_SPACE")
          if not token:
              raise SystemExit("Missing GitHub secret: HF_TOKEN")
          if not repo_id:
              raise SystemExit("Missing GitHub secret: HF_SPACE")

          api = HfApi(token=token)
          api.upload_folder(
              folder_path="hf_space_upload",
              repo_id=repo_id,
              repo_type="space",
              delete_patterns=["*"],
              commit_message="Deploy Paperclip control room from GitHub Actions",
          )
          print(f"Uploaded Paperclip Space files to {repo_id}")
          PY
